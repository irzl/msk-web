<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSK — Manajemen Stratejik dan Kepemimpinan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2a;
    --accent: #a78bfa;
    --accent2: #818cf8;
    --text: #f0f0ff;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.08);
    --sidebar-w: 290px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── TOP NAV ── */
  .topnav {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 1.2rem;
    gap: 1rem;
    flex-shrink: 0;
    z-index: 100;
  }

  .hamburger {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 0.3rem;
    display: flex;
    align-items: center;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .hamburger:hover { color: var(--text); }

  .topnav-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 500;
  }

  .topnav-bab {
    font-size: 0.82rem;
    color: var(--muted);
    margin-left: auto;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 340px;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    transition: transform 0.3s ease, width 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .sidebar.collapsed {
    transform: translateX(calc(-1 * var(--sidebar-w)));
    width: 0;
  }

  .sidebar-header {
    padding: 1.2rem 1.2rem 0.8rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 0.15rem;
    line-height: 1.3;
  }
  .sidebar-header p {
    font-size: 0.68rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .sidebar-search {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.75rem;
    font-size: 0.77rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: rgba(167,139,250,0.4); }
  .sidebar-search input::placeholder { color: var(--muted); }

  .nav-list { list-style: none; padding: 0.5rem 0; flex: 1; }

  .nav-btn {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    padding: 0.55rem 1rem;
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    position: relative;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.035); }
  .nav-btn.active { background: rgba(167,139,250,0.09); }
  .nav-btn.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .nav-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    font-weight: 700;
    color: #000;
    padding: 0.17rem 0.42rem;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 0.15rem;
    white-space: nowrap;
    line-height: 1.4;
  }

  .nav-text { flex: 1; }
  .nav-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    line-height: 1.35;
    transition: color 0.15s;
  }
  .nav-btn.active .nav-title, .nav-btn:hover .nav-title { color: var(--text); }
  .nav-btn.active .nav-title { color: var(--accent); }

  .nav-locked {
    font-size: 0.63rem;
    color: rgba(107,114,128,0.6);
    margin-top: 0.08rem;
    font-family: 'DM Mono', monospace;
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .content iframe {
    width: 100%; flex: 1; border: none; display: none;
  }
  .content iframe.active { display: block; }

  /* ── WELCOME SCREEN ── */
  .welcome {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background: var(--bg);
    z-index: 10;
    transition: opacity 0.3s;
    overflow-y: auto;
  }
  .welcome.hidden { opacity: 0; pointer-events: none; }

  .welcome-logo {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(167,139,250,0.3);
    padding: 0.3rem 1rem;
    border-radius: 99px;
    margin-bottom: 1.5rem;
  }
  .welcome h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 4.5vw, 2.8rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 0.8rem;
    background: linear-gradient(135deg, #a78bfa, #818cf8, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome p {
    font-size: 0.88rem;
    color: var(--muted);
    max-width: 500px;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.6rem;
    max-width: 780px;
    width: 100%;
  }
  .chapter-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .chapter-chip:hover {
    border-color: rgba(167,139,250,0.35);
    background: rgba(167,139,250,0.06);
    transform: translateY(-2px);
  }
  .chapter-chip.locked {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .chapter-chip.locked:hover {
    transform: none;
    border-color: var(--border);
    background: var(--surface);
  }
  .chip-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.57rem;
    margin-bottom: 0.3rem;
    font-weight: 700;
  }
  .chip-title {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .chip-badge {
    display: inline-block;
    margin-top: 0.35rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    padding: 0.08rem 0.4rem;
    border-radius: 99px;
    background: rgba(167,139,250,0.12);
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .chip-badge.locked-badge {
    background: rgba(107,114,128,0.12);
    color: var(--muted);
  }

  /* ── SIDEBAR DIVIDER ── */
  .nav-divider { padding:.7rem 1rem .3rem; font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(107,114,128,0.5); border-top:1px solid var(--border); margin-top:.4rem; }
  .nav-btn-exam { display:flex; align-items:center; gap:.7rem; padding:.65rem 1rem; width:100%; background:none; border:none; cursor:pointer; text-align:left; transition:background .15s; position:relative; }
  .nav-btn-exam:hover { background:rgba(255,255,255,.035); }
  .nav-btn-exam.active { background:rgba(244,114,182,.09); }
  .nav-btn-exam.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#f472b6; border-radius:0 2px 2px 0; }
  .nav-exam-icon { font-size:1rem; flex-shrink:0; width:26px; text-align:center; }
  .nav-exam-title { font-size:.78rem; font-weight:600; color:var(--muted); line-height:1.35; transition:color .15s; flex:1; }
  .nav-btn-exam:hover .nav-exam-title { color:var(--text); }
  .nav-btn-exam.active .nav-exam-title { color:#f472b6; }
  .nav-exam-badge { font-family:'DM Mono',monospace; font-size:.55rem; font-weight:700; background:rgba(244,114,182,.15); color:#f472b6; padding:.12rem .4rem; border-radius:3px; flex-shrink:0; border:1px solid rgba(244,114,182,.25); }
  .chapter-chip-exam { background:var(--surface); border:1px solid rgba(244,114,182,.3); border-radius:10px; padding:.75rem .85rem; cursor:pointer; transition:all .2s; text-align:left; grid-column:1/-1; }
  .chapter-chip-exam:hover { border-color:rgba(244,114,182,.55); background:rgba(244,114,182,.06); transform:translateY(-2px); }
  .chip-exam-inner { display:flex; align-items:center; gap:.75rem; }
  .chip-exam-icon { font-size:1.3rem; flex-shrink:0; }
  .chip-exam-text .chip-num { color:#f472b6; margin-bottom:.2rem; font-family:'DM Mono',monospace; font-size:.6rem; font-weight:700; }
  .chip-exam-text .chip-title { font-size:.78rem; font-weight:600; color:var(--text); line-height:1.3; }
  .chip-exam-text .chip-badge { display:inline-block; margin-top:.3rem; font-family:'DM Mono',monospace; font-size:.55rem; padding:.08rem .4rem; border-radius:99px; background:rgba(244,114,182,.12); color:#f472b6; }

  /* ── SCROLLBAR ── */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .welcome::-webkit-scrollbar { width: 4px; }
  .welcome::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    :root { --sidebar-w: 270px; }
    .sidebar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }
    .sidebar.collapsed {
      transform: translateX(-100%);
      width: var(--sidebar-w);
    }
    .mobile-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 40;
    }
    .mobile-overlay.active { display: block; }
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <button class="hamburger" id="hamburgerBtn" title="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <span class="topnav-title">MSK</span>
  <span class="topnav-bab" id="currentBabLabel">Pilih bab untuk memulai</span>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Outline Materi</h2>
      <p>14 BAB + LATIHAN SOAL · MSK</p>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Cari bab..." autocomplete="off">
    </div>
    <ul class="nav-list" id="navList"></ul>
  </aside>

  <!-- MOBILE OVERLAY -->
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <!-- CONTENT -->
  <main class="content" id="contentArea">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-logo">MSK · Outline Materi</div>
      <h1>Manajemen Stratejik<br>&amp; Kepemimpinan</h1>
      <p>14 bab materi kuliah CA Indonesia dalam satu portal. Pilih bab di sidebar kiri atau klik salah satu di bawah untuk mulai belajar.</p>
      <div class="chapter-grid" id="chapterGrid">
        <!-- Exam chip inserted by JS -->
      </div>
    </div>
  </main>
</div>

<script>
  const chapters = [
    {
      id: 1,
      file: 'msk-bab1-outline.html',
      num: 'BAB I',
      title: 'Pengantar Manajemen Stratejik dan Kepemimpinan',
      color: '#e8c547',
      available: true
    },
    {
      id: 2,
      file: 'msk-bab2-outline.html',
      num: 'BAB II',
      title: 'Menyusun Arah Dasar Perusahaan: Visi, Misi, Tujuan dan Strategi',
      color: '#58a6ff',
      available: true
    },
    {
      id: 3,
      file: 'msk-bab3-outline.html',
      num: 'BAB III',
      title: 'Mengevaluasi Lingkungan Eksternal Perusahaan',
      color: '#4ecdc4',
      available: true
    },
    {
      id: 4,
      file: 'msk-bab4-outline.html',
      num: 'BAB IV',
      title: 'Mengevaluasi Sumber Daya, Kapabilitas, dan Daya Saing Perusahaan',
      color: '#ff6b6b',
      available: true
    },
    {
      id: 5,
      file: 'msk-bab5-outline.html',
      num: 'BAB V',
      title: 'Lima Strategi Kompetitif Generik: Yang Manakah yang Akan Diterapkan?',
      color: '#a78bfa',
      available: true
    },
    {
      id: 6,
      file: 'msk-bab6-outline.html',
      num: 'BAB VI',
      title: 'Memperkuat Posisi Daya Saing Perusahaan',
      color: '#f59e0b',
      available: true
    },
    {
      id: 7,
      file: 'msk-bab7-outline.html',
      num: 'BAB VII',
      title: 'Strategi untuk Bersaing di Pasar Internasional',
      color: '#38bdf8',
      available: true
    },
    {
      id: 8,
      file: 'msk-bab8-outline.html',
      num: 'BAB VIII',
      title: 'Strategi Perusahaan: Diversifikasi dan Perusahaan Multi-Bisnis',
      color: '#34d399',
      available: true
    },
    {
      id: 9,
      file: 'msk-bab9-outline.html',
      num: 'BAB IX',
      title: 'Etika, CSR, Kelanggengan Lingkungan Sekitar dan Strategi',
      color: '#fb923c',
      available: true
    },
    {
      id: 10,
      file: 'msk-bab10-outline.html',
      num: 'BAB X',
      title: 'Membangun Organisasi yang Mampu Mengimplementasikan Strategi Perusahaan',
      color: '#e879f9',
      available: true
    },
    {
      id: 11,
      file: 'msk-bab11-outline.html',
      num: 'BAB XI',
      title: 'Mengelola Operasional Internal',
      color: '#2dd4bf',
      available: true
    },
    {
      id: 12,
      file: 'msk-bab12-outline.html',
      num: 'BAB XII',
      title: 'Kepemimpinan dan Budaya Korporat',
      color: '#818cf8',
      available: true
    },
    {
      id: 13,
      file: 'msk-bab13-outline.html',
      num: 'BAB XIII',
      title: 'Kepemimpinan Stratejik',
      color: '#2dd4bf',
      available: true
    },
    {
      id: 14,
      file: 'msk-bab14-outline.html',
      num: 'BAB XIV',
      title: 'Perubahan Strategik dan Organisasi',
      color: '#f472b6',
      available: true
    }
  ];

  let activeId = null;
  const iframes = {};
  let examIframe = null;

  // Build sidebar nav
  const navList = document.getElementById('navList');
  chapters.forEach(ch => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.dataset.id = ch.id;
    li.dataset.title = (ch.num + ' ' + ch.title).toLowerCase();
    li.innerHTML = `
      <button class="nav-btn" onclick="loadChapter(${ch.id})" ${!ch.available ? 'disabled style="opacity:0.45;cursor:not-allowed;"' : ''}>
        <span class="nav-num" style="background:${ch.color}">${ch.num}</span>
        <div class="nav-text">
          <div class="nav-title">${ch.title}</div>
          ${!ch.available ? '<div class="nav-locked">⏳ Segera hadir</div>' : ''}
        </div>
      </button>`;
    navList.appendChild(li);
  });

  // Add exam divider + entry to sidebar
  const examDivider = document.createElement('li');
  examDivider.innerHTML = `<div class="nav-divider">⚡ Latihan Ujian</div>`;
  navList.appendChild(examDivider);

  const examLi = document.createElement('li');
  examLi.className = 'nav-item';
  examLi.dataset.id = 'exam';
  examLi.dataset.title = 'latihan soal ujian pilihan ganda esai studi kasus ca indonesia';
  examLi.innerHTML = `
    <button class="nav-btn-exam" id="examNavBtn" onclick="loadExam()">
      <span class="nav-exam-icon">📝</span>
      <span class="nav-exam-title">Latihan Soal Ujian<br><span style="font-size:.68rem;font-weight:400;color:var(--muted);">30 PG · 3 Esai · 1 Studi Kasus</span></span>
      <span class="nav-exam-badge">NEW</span>
    </button>`;
  navList.appendChild(examLi);

  // Add exam chip to welcome grid (full-width, at top)
  const grid = document.getElementById('chapterGrid');
  const examChip = document.createElement('div');
  examChip.className = 'chapter-chip-exam';
  examChip.onclick = loadExam;
  examChip.innerHTML = `
    <div class="chip-exam-inner">
      <span class="chip-exam-icon">📝</span>
      <div class="chip-exam-text">
        <div class="chip-num">LATIHAN SOAL UJIAN</div>
        <div class="chip-title">Contoh Soal CA Indonesia — 30 PG + 3 Esai + 1 Studi Kasus + Pembahasan Lengkap</div>
        <div class="chip-badge">✓ Tersedia · Kunci Jawaban Otomatis</div>
      </div>
    </div>`;
  grid.appendChild(examChip);

  // Build chapter chips (14 bab)
  chapters.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'chapter-chip' + (ch.available ? '' : ' locked');
    if (ch.available) div.onclick = () => loadChapter(ch.id);
    div.innerHTML = `
      <div class="chip-num" style="color:${ch.color}">${ch.num}</div>
      <div class="chip-title">${ch.title}</div>
      <div class="chip-badge ${ch.available ? '' : 'locked-badge'}">${ch.available ? '✓ Tersedia' : '⏳ Segera'}</div>`;
    grid.appendChild(div);
  });

  // Load exam
  function loadExam() {
    document.getElementById('welcomeScreen').classList.add('hidden');
    Object.values(iframes).forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.nav-btn-exam').forEach(btn => btn.classList.remove('active'));

    document.getElementById('examNavBtn')?.classList.add('active');
    document.getElementById('currentBabLabel').textContent = '📝 Latihan Soal Ujian — CA Indonesia MSK';

    if (!examIframe) {
      examIframe = document.createElement('iframe');
      examIframe.src = 'msk-latihan-soal.html';
      examIframe.title = 'Latihan Soal Ujian MSK';
      examIframe.loading = 'lazy';
      document.getElementById('contentArea').appendChild(examIframe);
    }
    // Hide all chapter iframes, show exam
    Object.values(iframes).forEach(f => f.classList.remove('active'));
    examIframe.classList.add('active');
    activeId = 'exam';

    if (window.innerWidth <= 640) closeSidebar();
  }

  function loadChapter(id) {
    const ch = chapters.find(c => c.id === id);
    if (!ch || !ch.available) return;

    document.getElementById('welcomeScreen').classList.add('hidden');
    Object.values(iframes).forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.nav-btn-exam').forEach(btn => btn.classList.remove('active'));
    if (examIframe) examIframe.classList.remove('active');

    const navBtn = document.querySelector(`.nav-item[data-id="${id}"] .nav-btn`);
    if (navBtn) navBtn.classList.add('active');

    document.getElementById('currentBabLabel').textContent = `${ch.num} — ${ch.title}`;

    if (!iframes[id]) {
      const iframe = document.createElement('iframe');
      iframe.src = ch.file;
      iframe.title = ch.title;
      iframe.loading = 'lazy';
      document.getElementById('contentArea').appendChild(iframe);
      iframes[id] = iframe;
    }
    iframes[id].classList.add('active');
    activeId = id;

    if (window.innerWidth <= 640) closeSidebar();
  }

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobileOverlay');

  document.getElementById('hamburgerBtn').addEventListener('click', () => {
    if (sidebar.classList.contains('collapsed')) {
      sidebar.classList.remove('collapsed');
      overlay.classList.add('active');
    } else {
      closeSidebar();
    }
  });

  overlay.addEventListener('click', closeSidebar);

  function closeSidebar() {
    sidebar.classList.add('collapsed');
    overlay.classList.remove('active');
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    document.querySelectorAll('.nav-item').forEach(item => {
      item.style.display = (!q || item.dataset.title.includes(q)) ? '' : 'none';
    });
    // Also handle divider visibility
